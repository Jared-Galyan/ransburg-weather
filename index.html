<!DOCTYPE html>
<html lang="en" class="bg-[#0a1a33]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a1a33" />
    <title>Weather Display</title>
    <meta
      name="description"
      content="Live local weather, forecasts, and NWS alerts for a vertical TV display"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#2563eb",
            },
            fontFamily: {
              sans: ["system-ui", "-apple-system", "Segoe UI", "Roboto", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      html { -webkit-font-smoothing: antialiased; }
      .tabular { font-variant-numeric: tabular-nums; }
      body {
        background-image: linear-gradient(
            to bottom,
            rgba(6, 17, 38, 0.55),
            rgba(6, 17, 38, 0.8)
          ),
          url("./public/nature-bg.png");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }
    </style>
  </head>
  <body class="h-screen overflow-hidden text-white font-sans">
    <main class="mx-auto flex h-screen max-w-[820px] flex-col gap-3 px-6 py-4">
      <!-- Header -->
      <header class="relative shrink-0 rounded-2xl border border-sky-400/25 bg-blue-950/55 px-6 py-3 text-center shadow-lg backdrop-blur">
        <button
          id="settings-btn"
          aria-label="Change location"
          class="absolute right-3 top-3 inline-flex size-9 items-center justify-center rounded-lg border border-sky-400/30 bg-blue-900/60 text-sky-200 transition hover:bg-blue-800/70"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <img
          src="./public/ransburg-logo.png"
          alt="Ransburg Scout Reservation"
          class="mx-auto mt-2 h-12 w-auto"
        />
        <h1 class="text-5xl font-extrabold uppercase leading-none tracking-tight text-white">
          Weather
        </h1>
        <span id="location" class="sr-only">Loading location…</span>
        <div class="mt-1.5 flex items-center justify-center gap-3 text-sky-200/80">
          <span class="flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-sky-300" aria-hidden="true"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
            <span id="date" class="text-base uppercase tabular"></span>
          </span>
          <span class="h-4 w-px bg-sky-400/40"></span>
          <span class="flex items-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-sky-300" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="clock" class="text-base tabular">--:--</span>
          </span>
        </div>
      </header>

      <!-- Location editor -->
      <div
        id="editor"
        class="hidden items-center gap-3 rounded-2xl border border-sky-400/25 bg-blue-950/70 px-5 py-4 backdrop-blur"
      >
        <label for="zip" class="text-lg font-medium text-white">ZIP code</label>
        <input
          id="zip"
          inputmode="numeric"
          maxlength="5"
          placeholder="10001"
          class="w-32 rounded-lg border border-sky-400/30 bg-blue-900/50 px-3 py-2 text-lg text-white tabular outline-none placeholder:text-sky-200/40 focus:ring-2 focus:ring-sky-400"
        />
        <button
          id="save-btn"
          class="rounded-lg bg-sky-500 px-4 py-2 font-medium text-white transition hover:bg-sky-400"
        >
          Save
        </button>
      </div>

      <!-- Content -->
      <div id="content" class="flex min-h-0 flex-1 flex-col gap-3">
        <p class="text-center text-lg text-sky-200/70">Loading weather…</p>
      </div>

      <!-- Footer -->
      <footer class="flex shrink-0 flex-col items-center gap-1">
        <div
          class="flex items-center justify-center gap-2 rounded-full border border-sky-400/25 bg-blue-950/65 px-6 py-2 text-sm font-semibold uppercase tracking-wide text-sky-100 shadow-lg backdrop-blur"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" class="text-emerald-300" aria-hidden="true"><path d="M12 2 7 9h2.5L5 15h4v3a1 1 0 0 0 2 0v-3h4l-4.5-6H15z"/></svg>
          <span>Be Prepared. Enjoy your time at camp!</span>
        </div>
        <p class="flex items-center gap-1.5 text-xs text-sky-200/50">
          <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
          <span id="updated">Data from the National Weather Service</span>
        </p>
      </footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
